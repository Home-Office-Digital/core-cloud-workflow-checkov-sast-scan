name: Checkov Scan
on:
  workflow_call:
    inputs:
      plan_role:
        required: true
        type: string
      env_name:
        required: false
        type: string
      path:
        required: false
        type: string
      version-tag:
        required: false
        type: string
        default: 'main'
      runner:
        description: 'For use with a specific runner'
        type: string
        required: false
        default: 'ubuntu-latest'
      org:
        description: 'Set if using GHES instance'
        type: string
        required: false
        default: 'Home-Office-Digital'
      TF_VAR_source-repo:
        required: true
        type: string
      terragrunt_parallelism:
        description: 'Max number of concurrent Terragrunt modules'
        required: false
        type: string
        default: '4'
    secrets:
      account_id:
        required: false
      EXEMPTIONS_APP_ID:
        description: Exemptions secret applied by the Core Cloud team when exceptions are approved and required.
        required: false
      EXEMPTIONS_APP_PRIVATE_KEY:
        description: Exemptions secret applied by the Core Cloud team when exceptions are approved and required.
        required: false

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

jobs:
  checkov-scan-tfplan-only:
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.env_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Run Checkov TFPlan Only Scan
        # Always bump this to the latest commit sha of the latest tag in a subsequent PR after your PR has been approved.
        uses: Home-Office-Digital/core-cloud-workflow-checkov-sast-scan/actions/tfplan@5bc257b715cd182872f613adfba43f7faf3acbdf # 1.20.3
        timeout-minutes: 20
        with:
          plan_role: ${{ inputs.plan_role }}
          path: ${{ inputs.path }}
          env_name: ${{ inputs.env_name }}
          TF_VAR_source-repo: ${{ inputs.TF_VAR_source-repo }}
          account_id: ${{ secrets.account_id }}
          terragrunt_parallelism: ${{ inputs.terragrunt_parallelism }}
          EXEMPTIONS_APP_ID: ${{ secrets.EXEMPTIONS_APP_ID }}
          EXEMPTIONS_APP_PRIVATE_KEY: ${{ secrets.EXEMPTIONS_APP_PRIVATE_KEY }}
