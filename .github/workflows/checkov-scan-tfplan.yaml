# This workflow is for scanning your Terraform Plan file/s with Checkov
# Environment variables are currently used instead of a Checkov config file as all options are available and it saves having to add additional steps for checking out the repo with a token.
# https://github.com/bridgecrewio/checkov-action/blob/master/action.yml

name: Checkov Reusable Plan Scan

on:
  workflow_call:
    inputs:
      plan_role:
        required: false
        type: string
      env_name:
        required: false
        type: string
      path:
        required: false
        type: string
      version-tag:
        required: false
        type: string
        default: 'main'
      runner:
        description: 'For use with a specific runner'
        type: string
        required: false
        default: 'ubuntu-latest'
      org:
        description: 'Set if using GHES instance'
        type: string
        required: false
        default: 'Home-Office-Digital'
      download_external_modules:
        description: 'Download external Terraform modules during scan'
        type: boolean
        required: false
        default: false
      TF_VAR_source-repo:
        required: false
        type: string
      terragrunt_parallelism:
        description: 'Max number of concurrent Terragrunt modules'
        required: false
        type: string
        default: '4'
    secrets:
      account_id:
        required: false
      EXEMPTIONS_APP_ID:
        description: Exemptions secret applied by the Core Cloud team when exceptions are approved and required.
        required: false
      EXEMPTIONS_APP_PRIVATE_KEY:
        description: Exemptions secret applied by the Core Cloud team when exceptions are approved and required.
        required: false

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

jobs:
  checkov-scan:
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.env_name || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout reusable workflow for custom policies
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: '${{ inputs.org }}/core-cloud-workflow-checkov-sast-scan'
          ref: ${{ inputs.version-tag }}
          path: 'checkout-central-checkov-policies'

      - name: Move policies
        run: |
          mkdir -p central-checkov-policies
          mv checkout-central-checkov-policies/central-checkov-policies central-checkov-policies
          mv checkout-central-checkov-policies/finops-policies finops-policies

      - name: Mint exemptions repo token
        id: mint_token
        if: secrets.EXEMPTIONS_APP_ID != '' && secrets.EXEMPTIONS_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.EXEMPTIONS_APP_ID }}
          private-key: ${{ secrets.EXEMPTIONS_APP_PRIVATE_KEY }}
          owner: Home-Office-Digital
          repositories: core-cloud-cve-exemptions

      - name: Checking for any repo-scoped Checkov exceptions
        id: resolve_exceptions
        env:
          EXEMPTIONS_TOKEN: ${{ steps.mint_token.outputs.token }}
        run: |
          set -e

          REPO="${{ github.repository }}"
          EXCEPTIONS_FILE=""
          GLOBAL_SKIP_FILE=""

          if [ -n "$EXEMPTIONS_TOKEN" ]; then
            EXCEPTIONS_FILE="$(mktemp "$RUNNER_TEMP/repo-exceptions-XXXXXX.json")"
            status="$(curl -s -o "$EXCEPTIONS_FILE" -w '%{http_code}' \
              -H "Authorization: Bearer $EXEMPTIONS_TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/Home-Office-Digital/core-cloud-cve-exemptions/contents/exemptions/checkov/repo-exceptions.json")"

            if [ "$status" = "200" ]; then
              echo "Applying centrally managed Checkov exceptions"
            elif [ "$status" = "404" ]; then
              echo "No centrally managed Checkov exceptions found"
              EXCEPTIONS_FILE=""
            else
              echo "::error::Failed to fetch Checkov exceptions file (HTTP $status)"
              exit 1
            fi

            GLOBAL_SKIP_FILE="$(mktemp "$RUNNER_TEMP/global-skip-check-XXXXXX.json")"
            status="$(curl -s -o "$GLOBAL_SKIP_FILE" -w '%{http_code}' \
              -H "Authorization: Bearer $EXEMPTIONS_TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/Home-Office-Digital/core-cloud-cve-exemptions/contents/exemptions/checkov/global-skip-check.json")"

            if [ "$status" = "200" ]; then
              echo "Applying org-wide Checkov global skip list"
            elif [ "$status" = "404" ]; then
              echo "No org-wide Checkov global skip list found"
              GLOBAL_SKIP_FILE=""
            else
              echo "::error::Failed to fetch global skip check file (HTTP $status)"
              exit 1
            fi
          else
            echo "No exemptions app credentials configured for this repo - no Checkov exceptions or global skips applied"
          fi

          GLOBAL_SKIP=""
          REPO_SKIP=""
          REPO_SOFT_FAIL_ON=""

          if [ -n "$GLOBAL_SKIP_FILE" ] && [ -f "$GLOBAL_SKIP_FILE" ]; then
            while IFS= read -r id; do
              [ -n "$id" ] && echo "::add-mask::$id"
            done < <(jq -r '.global_skip_check // [] | map(.id) | .[]' "$GLOBAL_SKIP_FILE")

            GLOBAL_SKIP=$(jq -r \
              '.global_skip_check // [] | map(.id) | join(",")' \
              "$GLOBAL_SKIP_FILE")
          fi

          if [ -n "$EXCEPTIONS_FILE" ] && [ -f "$EXCEPTIONS_FILE" ]; then
            while IFS= read -r id; do
              [ -n "$id" ] && echo "::add-mask::$id"
            done < <(jq -r --arg repo "$REPO" '.exceptions[$repo].skip_check // [] | map(.id) | .[]' "$EXCEPTIONS_FILE")

            REPO_SKIP=$(jq -r --arg repo "$REPO" \
              '.exceptions[$repo].skip_check // [] | map(.id) | join(",")' \
              "$EXCEPTIONS_FILE")
            REPO_SOFT_FAIL_ON=$(jq -r --arg repo "$REPO" \
              '.exceptions[$repo].soft_fail_on // [] | map(.id) | join(",")' \
              "$EXCEPTIONS_FILE")
          fi

          COMBINED_SKIP="$GLOBAL_SKIP"
          [ -n "$REPO_SKIP" ] && COMBINED_SKIP="${COMBINED_SKIP:+${COMBINED_SKIP},}${REPO_SKIP}"

          echo "skip_check=${COMBINED_SKIP}" >> "$GITHUB_OUTPUT"
          echo "soft_fail_on=${REPO_SOFT_FAIL_ON}" >> "$GITHUB_OUTPUT"

      - name: Checkout Checkov Map File
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: '${{ inputs.org }}/core-cloud-workflow-checkov-sast-scan'
          ref: 'checkov-mapping-updates'
          path: 'checkout-checkov-mapping-updates'

      - uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        id: assume
        if: ${{ inputs.plan_role != '' }}
        name: Configure AWS IdP Credentials
        with:
          role-to-assume: arn:aws:iam::${{ secrets.account_id }}:role/${{ inputs.plan_role }}
          role-session-name: GitHubActions
          retry-max-attempts: 5
          aws-region: eu-west-2

      - name: Setup Terraform
        if: ${{ inputs.plan_role != '' }}
        id: terraform_setup
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Create output folder
        if: ${{ inputs.plan_role != '' }}
        id: create_output_folder
        run: mkdir -p $GITHUB_WORKSPACE/outputs/${{ inputs.path }}

      - name: Terragrunt Plan
        if: ${{ inputs.plan_role != '' }}
        id: terraform_plan
        uses: gruntwork-io/terragrunt-action@9559e51d05873b0ea467c42bbabcb5c067642ccc # v2
        with:
          tf_version: 1.9.3
          tg_version: 0.59.6
          tg_dir: ./${{ inputs.path }}
          tg_command: 'run-all plan --terragrunt-parallelism ${{ inputs.terragrunt_parallelism }} --terragrunt-out-dir /github/workspace/outputs/${{ inputs.path }} --terragrunt-json-out-dir /github/workspace/outputs/${{ inputs.path }}'
        timeout-minutes: 20
        env:
          TF_VAR_source-repo: ${{ inputs.TF_VAR_source-repo }}
          TF_VAR_env_name: ${{ inputs.env_name }}
          env_name: ${{ inputs.env_name }}

      - name: Run Checkov Scan (Plan Files)
        if: ${{ inputs.plan_role != '' }}
        id: checkov_scan_plan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          output_format: cli,sarif
          quiet: true
          soft_fail: true
          directory: ${{ github.workspace }}/outputs/${{ inputs.path }}
          output_file_path: results-plan.sarif
          external_checks_dirs: central-checkov-policies
          skip_check: ${{ steps.resolve_exceptions.outputs.skip_check }}
          download_external_modules: true

      - name: Run Checkov Scan (FinOps policies only)
        if: ${{ inputs.plan_role != '' }}
        id: checkov_scan_finops
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          output_format: cli
          quiet: true
          soft_fail: true
          directory: ${{ github.workspace }}/outputs/${{ inputs.path }}
          framework: terraform_plan
          external_checks_dirs: finops-policies
          download_external_modules: true
          check: CC_FINOPS_TAGS

      - name: Run Checkov Scan
        id: checkov_scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          output_format: cli,sarif
          quiet: true
          soft_fail: true
          directory: '.'
          output_file_path: results-root.sarif
          external_checks_dirs: central-checkov-policies
          skip_check: ${{ steps.resolve_exceptions.outputs.skip_check }}
          download_external_modules: ${{ inputs.download_external_modules }}

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.8'

      - name: Fix File Permissions (Repository Root)
        run: sudo chown -R $USER:$USER results-root.sarif

      - name: Fix File Permissions (Plan files)
        if: ${{ inputs.plan_role != '' }}
        run: sudo chown -R $USER:$USER results-plan.sarif

      - name: Process SARIF file (Repository Root)
        run: python3 -u checkout-checkov-mapping-updates/scripts/update_via_map_file.py
        env:
          SARIF_DIRS: "results-root.sarif"

      - name: Process SARIF file (Plan files)
        if: ${{ inputs.plan_role != '' }}
        run: python3 -u checkout-checkov-mapping-updates/scripts/update_via_map_file.py
        env:
          SARIF_DIRS: "results-plan.sarif"

      - name: Listing findings and severity levels (Repository Root)
        run: python3 -u checkout-checkov-mapping-updates/scripts/enforce_severity_gate.py
        env:
          SARIF_DIRS: "results-root.sarif"
          SOFT_FAIL_ON: ${{ steps.resolve_exceptions.outputs.soft_fail_on }}

      - name: Listing findings and severity levels (Plan files)
        if: ${{ inputs.plan_role != '' }}
        run: python3 -u checkout-checkov-mapping-updates/scripts/enforce_severity_gate.py
        env:
          SARIF_DIRS: "results-plan.sarif"
          SOFT_FAIL_ON: ${{ steps.resolve_exceptions.outputs.soft_fail_on }}

      - name: Determine commit SHA for SARIF upload
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          SHA=$(git cat-file -p HEAD | grep '^parent' | sed -n '2p' | awk '{print $2}')
          if [ -n "$SHA" ]; then
            PR_NUMBER=$(echo "$GITHUB_REF" | sed 's|refs/pull/\([0-9]*\)/merge|\1|')
            git fetch --depth=1 origin "refs/pull/${PR_NUMBER}/head" 2>/dev/null || true
            git checkout "$SHA" 2>/dev/null || true
          fi
          [ -z "$SHA" ] && SHA=$(git rev-parse HEAD)
          printf 'SARIF_COMMIT_SHA=%s\n' "$SHA" >> "$GITHUB_ENV"

      - name: Upload SARIF file (Plan Files)
        if: ${{ inputs.plan_role != '' && (success() || failure()) }}
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          sarif_file: 'results-plan.sarif'
          category: 'checkov-plan-scan'
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/head', github.event.number) || github.ref }}
          sha: ${{ env.SARIF_COMMIT_SHA || github.sha }}

      - name: Upload SARIF file (Repository Root)
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          sarif_file: 'results-root.sarif'
          category: 'checkov-repo-scan'
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/head', github.event.number) || github.ref }}
          sha: ${{ env.SARIF_COMMIT_SHA || github.sha }}
