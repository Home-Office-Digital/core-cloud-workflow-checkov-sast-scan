name: Checkov and Sonarqube Scans
 
on:
  workflow_call:
    inputs:
      runner:
        description: 'For use with a specific runner'
        type: string
        required: false
        default: 'ubuntu-latest'
    secrets:
      sonar_token:
        required: true
      sonar_host_url:
        required: true
      EXEMPTIONS_APP_ID:
        description: Exemptions secret applied by the Core Cloud team when exceptions are approved and required.
        required: false
      EXEMPTIONS_APP_PRIVATE_KEY:
        description: Exemptions secret applied by the Core Cloud team when exceptions are approved and required.
        required: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

jobs:
  checkov-scan:
    uses: Home-Office-Digital/core-cloud-workflow-checkov-sast-scan/.github/workflows/checkov-scan-base.yaml@c85f81ba89d5332970b268d5532b6ceff35dbcad # 1.12.1
    with:
      runner: ${{ inputs.runner || 'ubuntu-latest' }}
    secrets:
      EXEMPTIONS_APP_ID: ${{ secrets.EXEMPTIONS_APP_ID }}
      EXEMPTIONS_APP_PRIVATE_KEY: ${{ secrets.EXEMPTIONS_APP_PRIVATE_KEY }}

  sonarqube-scanner:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'

      - name: Run Tests & Generate Coverage
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          python -m pytest tests/ --cov=scripts --cov-report=xml

      - name: Sonarqube Composite Action
        uses: Home-Office-Digital/core-cloud-workflow-sonarqube-scan@edf89ed883dbba9e7b2610aedf3a217c1896692f # 1.1.7
        with:
          sonar_token: ${{ secrets.sonar_token }}
          sonar_host_url: ${{ secrets.sonar_host_url }}
