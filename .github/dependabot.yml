
---
version: 2
updates:
    # Enable Github Action updates
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "daily"
      commit-message:
          prefix: "chore(GHA)"
      labels:
          - "dependencies"
          - "patch"
          - "actions"
    

    # Enable PIP updates for Python Projects
    - package-ecosystem: "pip"
      directory: "/"
      schedule:
          interval: "daily"
      commit-message:
          prefix: "chore(Python)"
      labels:
          - "dependencies"
          - "patch"
          - "python"
        